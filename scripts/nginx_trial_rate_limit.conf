# /etc/nginx/conf.d/aeolab.conf 또는 기존 nginx 설정 파일에 추가
# trial 엔드포인트 전용 레이트 리밋 존 정의 (http 블록 안에 추가)

# ── http 블록에 추가 ───────────────────────────────────────────────────────
# limit_req_zone $binary_remote_addr zone=trial_limit:10m rate=2r/m;
#
# 설명:
#   - $binary_remote_addr : IP 기준으로 카운트
#   - zone=trial_limit:10m : 10MB 메모리에 약 160,000개 IP 저장 가능
#   - rate=2r/m            : 분당 2회 (= 1회/30초)
# ─────────────────────────────────────────────────────────────────────────────

# ── server 블록 안 /api/scan/trial location에 추가 ────────────────────────
# location = /api/scan/trial {
#     limit_req zone=trial_limit burst=3 nodelay;
#     limit_req_status 429;
#
#     proxy_pass         http://127.0.0.1:8000;
#     proxy_set_header   Host $host;
#     proxy_set_header   X-Real-IP $remote_addr;
#     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
# }
# ─────────────────────────────────────────────────────────────────────────────
# 현재 aeolab nginx 설정 파일 경로: /etc/nginx/sites-available/aeolab
# 적용 후 테스트: sudo nginx -t
# 재로드: sudo systemctl reload nginx
